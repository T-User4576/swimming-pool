# Example-Secret fuer StarRocks Shared-Data Storage Backend.
#
# WICHTIG: Diese Datei NIE mit echten Credentials in Git committen.
# In Produktion via SealedSecrets, External Secrets Operator (Vault/AWS SM/...)
# oder argocd-vault-plugin generieren.
#
# Render-Pfad fuer dev/poc:
#   1) Echte Werte in eine lokale, gitignored Datei kopieren
#   2) kubectl apply -n starrocks -f starrocks-s3-credentials.yaml
#
# Schluesselnamen MUESSEN exakt 'access_key' und 'secret_key' sein -- so erwartet
# das StarRocks-Operator-Schema (siehe values-prod.yaml -> credential.secretRef).

apiVersion: v1
kind: Secret
metadata:
  name: starrocks-s3-credentials
  namespace: starrocks
type: Opaque
stringData:
  access_key: "REPLACE_ME"
  secret_key: "REPLACE_ME"
