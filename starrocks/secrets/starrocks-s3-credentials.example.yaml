# Example secret for the StarRocks shared-data storage backend.
#
# IMPORTANT: NEVER commit this file with real credentials.
# In production, generate via SealedSecrets, External Secrets Operator
# (Vault / AWS SM / ...) or argocd-vault-plugin.
#
# Dev/PoC render path:
#   1) Copy real values into a local, gitignored file.
#   2) kubectl apply -n starrocks -f starrocks-s3-credentials.yaml
#
# Key names MUST be exactly 'access_key' and 'secret_key' — that is what
# the StarRocks operator schema expects (see values-prod.yaml ->
# credential.secretRef).

apiVersion: v1
kind: Secret
metadata:
  name: starrocks-s3-credentials
  namespace: starrocks
type: Opaque
stringData:
  access_key: "REPLACE_ME"
  secret_key: "REPLACE_ME"
