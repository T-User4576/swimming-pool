# =============================================================================
# Argo Workflows: StarRocks materialized view orchestration.
# =============================================================================
# Contains three building blocks:
#   1) WorkflowTemplate 'starrocks-mv-refresh'   -- generic refresh step
#   2) CronWorkflow     'mv-orders-recent-cron'  -- scheduled refresh
#   3) WorkflowTemplate 'gold-orders-pipeline'   -- DAG: mart load + MV
#                                                  refreshes (event-driven,
#                                                  not scheduled)
#
# Prerequisites:
#   - Argo Workflows installed, namespace 'argo'.
#   - ServiceAccount 'argo-workflow-starrocks' in namespace 'argo' with
#     permissions to create pods.
#   - Secret 'starrocks-svc-credentials' in namespace 'argo' with keys
#     'user' and 'password' (service account for SQL refresh).
#   - StarRocks FE service reachable at
#     starrocks-fe-service.starrocks.svc.cluster.local:9030.
# =============================================================================

---
# -----------------------------------------------------------------------------
# 1) Generic WorkflowTemplate: REFRESH MATERIALIZED VIEW.
# -----------------------------------------------------------------------------
# Called from CronWorkflows AND from DAGs. One refresh step everywhere.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: starrocks-mv-refresh
  namespace: argo
spec:
  serviceAccountName: argo-workflow-starrocks
  entrypoint: refresh
  templates:
    - name: refresh
      inputs:
        parameters:
          - name: mv_name
          - name: partition
            value: ""        # empty = full refresh, else PARTITION (...) FORCE
          - name: force
            value: "false"   # FORCE needed on schema/code changes
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
      container:
        image: mysql:8.0
        command: [bash, -c]
        env:
          - name: MV_NAME
            value: "{{inputs.parameters.mv_name}}"
          - name: PART
            value: "{{inputs.parameters.partition}}"
          - name: FORCE
            value: "{{inputs.parameters.force}}"
          - name: SR_HOST
            value: starrocks-fe-service.starrocks.svc.cluster.local
          - name: SR_USER
            valueFrom:
              secretKeyRef:
                name: starrocks-svc-credentials
                key: user
          - name: SR_PASS
            valueFrom:
              secretKeyRef:
                name: starrocks-svc-credentials
                key: password
        args:
          - |
            set -euo pipefail
            if [ -n "$PART" ]; then
              SQL="REFRESH MATERIALIZED VIEW ${MV_NAME} PARTITION ('${PART}') FORCE;"
            elif [ "$FORCE" = "true" ]; then
              SQL="REFRESH MATERIALIZED VIEW ${MV_NAME} FORCE;"
            else
              SQL="REFRESH MATERIALIZED VIEW ${MV_NAME};"
            fi
            echo "Executing: $SQL"
            mysql -h "$SR_HOST" -P 9030 -u "$SR_USER" -p"$SR_PASS" -e "$SQL"

            # Wait until refresh is done (async REFRESH returns immediately).
            for i in $(seq 1 60); do
              STATE=$(mysql -h "$SR_HOST" -P 9030 -u "$SR_USER" -p"$SR_PASS" -BN -e \
                "SELECT state FROM information_schema.materialized_views \
                 WHERE mv_name='${MV_NAME}';" || echo "UNKNOWN")
              echo "Attempt $i, state=$STATE"
              case "$STATE" in
                NORMAL|FINISHED|SUCCESS) exit 0 ;;
                FAILED|CANCELLED) exit 1 ;;
              esac
              sleep 30
            done
            echo "Timeout waiting for MV refresh"
            exit 1

---
# -----------------------------------------------------------------------------
# 2) CronWorkflow: scheduled refresh for mv_orders_recent.
# -----------------------------------------------------------------------------
# Pattern for hot-subset MVs without an event trigger — hourly suffices.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: mv-orders-recent-cron
  namespace: argo
spec:
  schedule: "0 * * * *"          # hourly
  concurrencyPolicy: Forbid       # prevent overlapping refreshes
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  workflowSpec:
    workflowTemplateRef:
      name: starrocks-mv-refresh
    arguments:
      parameters:
        - name: mv_name
          value: mv_orders_recent

---
# -----------------------------------------------------------------------------
# 3) WorkflowTemplate (DAG): mart load -> dependent MV refreshes.
# -----------------------------------------------------------------------------
# Pattern for event-driven refresh: after a successful Spark mart load, all
# dependent MVs are refreshed in parallel. That guarantees "mart -> MV"
# consistency and no MV lags behind the latest mart state.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gold-orders-pipeline
  namespace: argo
spec:
  serviceAccountName: argo-workflow-starrocks
  entrypoint: pipeline
  templates:
    - name: pipeline
      dag:
        tasks:
          # 1. Spark job reloads the Iceberg mart lake.gold.orders.
          - name: spark-mart-load
            templateRef:
              name: spark-job              # assumed to exist in your cluster
              template: run
            arguments:
              parameters:
                - name: job
                  value: gold_orders_load

          # 2. Refresh the daily aggregate (Pattern 1).
          - name: refresh-mv-orders-daily
            dependencies: [spark-mart-load]
            templateRef:
              name: starrocks-mv-refresh
              template: refresh
            arguments:
              parameters:
                - name: mv_name
                  value: mv_orders_daily

          # 3. Refresh the hot subset (Pattern 2).
          - name: refresh-mv-orders-recent
            dependencies: [spark-mart-load]
            templateRef:
              name: starrocks-mv-refresh
              template: refresh
            arguments:
              parameters:
                - name: mv_name
                  value: mv_orders_recent

          # 4. Hot cache of the dimension table (Pattern 3) — only when
          #    dim_customer was loaded in the same run; optional / parallel.
          - name: refresh-mv-dim-customer
            dependencies: [spark-mart-load]
            templateRef:
              name: starrocks-mv-refresh
              template: refresh
            arguments:
              parameters:
                - name: mv_name
                  value: mv_dim_customer_hot
