# StarRocks production Helm values.
# Chart: starrocks/kube-starrocks
# Profile: 10-100 TB hot layer, >500 users, >100 QPS, shared-data mode.
#
# Prerequisites:
#   - Namespace 'starrocks' exists.
#   - Secret 'starrocks-s3-credentials' exists (see secrets/).
#   - ConfigMaps 'starrocks-fe-config' and 'starrocks-cn-config' deployed.
#   - StorageClasses 'fast-ssd' (FE meta) and 'local-nvme' (CN cache)
#     available.
#   - Worker nodes with local NVMe carry the label
#     'starrocks.io/cache=nvme'.

nameOverride: starrocks
timeZone: Europe/Berlin

operator:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

starrocksCluster:
  enabledCn: true
  enabledBe: false
  componentValues:
    runMode: shared_data
  storageVolumes:
    - name: builtin_storage_volume
      type: S3
      bucket: starrocks-shared-data
      endpoint: http://minio.minio.svc.cluster.local:9000
      pathStyleAccess: true
      region: us-east-1
      credential:
        secretRef:
          name: starrocks-s3-credentials

starrocksFESpec:
  replicas: 3
  image:
    repository: starrocks/fe-ubuntu
    tag: "3.3.5"
  resources:
    requests: { cpu: "4", memory: "16Gi" }
    limits:   { cpu: "8", memory: "32Gi" }
  storageSpec:
    name: fe-meta
    storageClassName: fast-ssd
    storageSize: 50Gi
  configMapInfo:
    configMapName: starrocks-fe-config
    resolveKey: fe.conf
  # JAVA_OPTS is maintained in configmap-fe.yaml (fe.conf) — do not
  # duplicate here.
  # FE does not create the Iceberg metadata-cache directory itself.
  # Path must match iceberg_metadata_cache_disk_path in configmap-fe.yaml.
  initContainers:
    - name: init-iceberg-cache-dir
      image: busybox:1.36
      command: ["sh", "-c", "mkdir -p /opt/starrocks/fe/meta/iceberg_metadata_cache"]
      volumeMounts:
        - name: fe-meta
          mountPath: /opt/starrocks/fe/meta
  service:
    type: ClusterIP
  serviceAccount: starrocks
  podLabels:
    app.kubernetes.io/component: fe
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [fe]
          topologyKey: kubernetes.io/hostname

starrocksCnSpec:
  # IMPORTANT: with autoScalingPolicy active, do NOT set a `replicas`
  # field. The operator then nulls replicas and HPA takes control.
  # (Source: official chart values.yaml v1.11.4 — comment on CN replicas.)
  # replicas: 6   <- only set if autoScalingPolicy below is removed/commented out
  image:
    repository: starrocks/cn-ubuntu
    tag: "3.3.5"
  resources:
    requests: { cpu: "16", memory: "64Gi" }
    limits:   { cpu: "32", memory: "128Gi" }
  storageSpec:
    name: cn-cache
    storageClassName: local-nvme
    storageSize: 4000Gi
  configMapInfo:
    configMapName: starrocks-cn-config
    resolveKey: cn.conf
  cnEnvVars:
    - name: JAVA_OPTS_FOR_JDK_11
      value: "-Xmx4g -Xms4g"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: starrocks.io/cache
                operator: In
                values: ["nvme"]
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values: [cn]
            topologyKey: kubernetes.io/hostname
  # HPA for CN — prerequisites:
  #   - metrics-server in the cluster (kubectl top nodes must work).
  #   - K8s version >= 1.23 (autoscaling/v2 GA).
  # Note: FE is deliberately NOT scaled (raft quorum fixed at 3 replicas).
  autoScalingPolicy:
    version: v2
    minReplicas: 6
    maxReplicas: 12
    # horizontal-pod-autoscaler
    hpaPolicy:
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 70
        - type: Resource
          resource:
            name: memory
            target:
              type: Utilization
              averageUtilization: 75
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
        scaleDown:
          # Conservative: avoids pod termination mid-query.
          # Cache loss on scale-down costs re-warmup time.
          stabilizationWindowSeconds: 600
          selectPolicy: Disabled

# ServiceMonitor for Prometheus (cluster must run kube-prometheus-stack).
metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: prometheus

# =============================================================================
# Multi-warehouse — future extension, not enabled initially.
# =============================================================================
# Triggers for enabling it:
#
#   1) API p95 degrades visibly once nightly ETL/MV refresh runs
#      -> split off a dedicated wh_etl.
#   2) BI heavy queries evict the hot cache of the API lookup tables
#      -> dedicated wh_api for customer-facing workloads.
#   3) A single tenant/service needs guaranteed compute that resource
#      groups cannot isolate well enough.
#
# Until then: stay on the default warehouse + resource groups
# (rg_api/rg_bi/rg_etl). Multi-warehouse increases operational complexity
# (multiplied cache footprint, more pods, separate HPA per warehouse) and
# should only be introduced once the triggers above are measurable.
#
# -----------------------------------------------------------------------------
# Verified for kube-starrocks Helm chart 1.11.4.
# -----------------------------------------------------------------------------
# The chart values DO NOT expose a multi-warehouse field. Multi-warehouse
# is realized via the separate CRD 'StarRocksWarehouse', installed by the
# operator in 1.11.4 (verify with:
# `kubectl get crd | grep starrockswarehouses`).
#
# Pattern: the cluster stays managed via this Helm release. Additional
# warehouses are applied as their own manifests, all referencing the same
# StarRocksCluster (field: spec.starRocksCluster).
#
# -----------------------------------------------------------------------------
# Example manifest for a warehouse (own file, not via Helm).
# -----------------------------------------------------------------------------
# e.g. starrocks/warehouses/wh-api.yaml, apply with:
#   kubectl apply -n starrocks -f starrocks/warehouses/wh-api.yaml
#
# apiVersion: starrocks.com/v1
# kind: StarRocksWarehouse
# metadata:
#   name: wh-api
#   namespace: starrocks
# spec:
#   # MUST point at the StarRocksCluster created by this Helm release
#   # (default: 'kube-starrocks' or the nameOverride above).
#   starRocksCluster: starrocks
#   template:
#     image:
#       repository: starrocks/cn-ubuntu
#       tag: "3.3.5"
#     # replicas: do NOT set when autoScalingPolicy is active below
#     # (operator nulls replicas, HPA takes over). For a warehouse WITHOUT
#     # autoScalingPolicy, set 'replicas: N' explicitly instead.
#     resources:
#       requests: { cpu: "16", memory: "64Gi" }
#       limits:   { cpu: "32", memory: "128Gi" }
#     storageVolumes:
#       - name: cn-cache
#         storageClassName: local-nvme
#         storageSize: 4000Gi
#         mountPath: /opt/starrocks/cn/storage
#     configMapInfo:
#       configMapName: starrocks-cn-config
#       resolveKey: cn.conf
#     affinity:
#       nodeAffinity:
#         requiredDuringSchedulingIgnoredDuringExecution:
#           nodeSelectorTerms:
#             - matchExpressions:
#                 - key: starrocks.io/cache
#                   operator: In
#                   values: ["nvme"]
#     autoScalingPolicy:
#       version: v2
#       minReplicas: 3
#       maxReplicas: 8
#       hpaPolicy:
#         metrics:
#           - type: Resource
#             resource:
#               name: cpu
#               target: { type: Utilization, averageUtilization: 60 }
#         behavior:
#           scaleDown: { selectPolicy: Disabled }
#
# Analogously wh-bi.yaml and wh-etl.yaml — same 'starRocksCluster',
# different sizing profiles. wh_etl could have minReplicas: 0 for
# scale-to-zero off-peak.
#
# -----------------------------------------------------------------------------
# After apply: SQL setup.
# -----------------------------------------------------------------------------
#
#   SHOW WAREHOUSES;     -- wh_api / wh_bi / wh_etl must be listed.
#
#   CREATE WAREHOUSE wh_api  PROPERTIES ("size" = "small");
#   CREATE WAREHOUSE wh_bi   PROPERTIES ("size" = "medium");
#   CREATE WAREHOUSE wh_etl  PROPERTIES ("size" = "large");
#   -- May not be needed if the operator CR registers the warehouse entry
#   -- in the cluster automatically. Check with SHOW WAREHOUSES first.
#
#   ALTER USER 'svc_api' SET PROPERTY 'default_warehouse' = 'wh_api';
#   ALTER USER 'bi_team' SET PROPERTY 'default_warehouse' = 'wh_bi';
#   ALTER USER 'svc_etl' SET PROPERTY 'default_warehouse' = 'wh_etl';
#
# Outcome: each warehouse runs its own CN pods, its own cache, its own
# failure domain. Resource groups stay active on top (still limit
# per-user quota within a warehouse).
# =============================================================================
