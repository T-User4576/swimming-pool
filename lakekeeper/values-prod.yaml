# Lakekeeper Helm-Values für prod (OpenFGA-Authorizer + Role-Sync-Sidecar).
#
# WICHTIG: Erst nach erfolgreichem dev-E2E anwenden.
# Vor `helm upgrade` mit den existierenden Cluster-Werten mergen.

authz:
  backend: openfga

extraEnv:
  - name: LAKEKEEPER__OPENFGA__ENDPOINT
    value: "http://openfga.lakekeeper.svc.cluster.local:8081"
  - name: LAKEKEEPER__OPENFGA__STORE_NAME
    value: "lakekeeper"

# ---------------------------------------------------------------------------
# Role-Sync-Sidecar: Keycloak-Gruppen → Lakekeeper-Rollen
#
# Mapping: ROLE_MAPPING_<LAKEKEEPER-ROLLE>=KcGruppe1,KcGruppe2,...
#   - Rollenname muss in Lakekeeper existieren (case-insensitiv)
#   - Priorität bei mehrfacher Übereinstimmung: alphabetisch nach Rollenname
#   - User ohne passende Gruppe erhalten keine Rolle → manuelle Zuweisung via UI
#   - User mit bereits zugewiesener Rolle (auch manuell) werden nie angetastet
# ---------------------------------------------------------------------------
extraContainers:
  - name: role-sync
    image: python:3.12-slim
    command:
      - sh
      - -c
      - pip install --quiet --no-cache-dir requests && exec python /scripts/sync.py
    env:
      - name: KEYCLOAK_URL
        value: "https://keycloak.example.com"
      - name: KEYCLOAK_REALM
        value: "lakehouse"
      - name: KEYCLOAK_CLIENT_ID
        value: "svc-lakekeeper-sync"
      - name: LAKEKEEPER_URL
        value: "http://localhost:8181"
      - name: SYNC_INTERVAL_SECS
        value: "60"
      # --- Mapping (anpassen) ---
      - name: ROLE_MAPPING_ADMIN
        value: "AbteilungIT,AbteilungCompliance"
      - name: ROLE_MAPPING_WORKER
        value: "AbteilungData"
    envFrom:
      - secretRef:
          name: lakekeeper-role-sync-credentials
    volumeMounts:
      - name: role-sync-script
        mountPath: /scripts
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

extraVolumes:
  - name: role-sync-script
    configMap:
      name: lakekeeper-role-sync-script
