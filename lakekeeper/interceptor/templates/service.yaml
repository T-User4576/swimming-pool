apiVersion: v1
kind: Service
metadata:
  name: {{ include "interceptor.fullname" . }}
  labels:
    {{- include "interceptor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "interceptor.selectorLabels" . | nindent 4 }}
  ports:
    # UI/ingress traffic enters here — nginx forwards 1:1 to the
    # Lakekeeper service and mirrors in parallel to the receiver.
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
