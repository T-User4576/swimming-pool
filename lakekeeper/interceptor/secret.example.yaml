# EXAMPLE — NEVER COMMIT WITH REAL VALUES
#
# One-time Keycloak service-account "svc-lakekeeper-sync" setup:
#   - Keycloak Admin -> Clients -> Create -> Client ID: svc-lakekeeper-sync
#   - Enable service account, generate client secret
#   - Audience mapper on the dedicated scope -> aud=lakekeeper,
#     "Add to access token: ON"
#   - NO realm-management roles — the receiver reads groups directly from
#     the user token and needs no Keycloak admin access.
#   - In Lakekeeper (via `bootstrap-roles.sh` or curl, see ../README.md
#     step 6): grant the svc user `security_admin` on the default project.
#
# Create the real secret (before `helm install`):
#   kubectl create secret generic lakekeeper-role-sync-credentials \
#     --namespace lakekeeper \
#     --from-literal=KEYCLOAK_CLIENT_ID='svc-lakekeeper-sync' \
#     --from-literal=KEYCLOAK_CLIENT_SECRET='<client-secret>'
#
# The secret name must match `roleSync.credentialsSecret` in values.yaml.
# Both keys are mounted via `envFrom` as env vars into the role-sync
# container — the identity of this service account (client_id +
# client_secret) lives entirely in this secret.

apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-role-sync-credentials
  namespace: lakekeeper
type: Opaque
stringData:
  KEYCLOAK_CLIENT_ID: "svc-lakekeeper-sync"
  KEYCLOAK_CLIENT_SECRET: "CHANGEME"
