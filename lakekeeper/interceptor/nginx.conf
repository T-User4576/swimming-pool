# nginx reverse proxy in front of Lakekeeper (own pod, next to the
# Lakekeeper pod).
#
# Purpose: mirror every external request to Lakekeeper to the role-sync
# receiver (same pod, 127.0.0.1:8200) — fire-and-forget, headers only —
# so the receiver can read the user JWT's `groups` claim and assign a
# Lakekeeper role without delaying or affecting the original request.
#
# Upstream wiring: nginx listens on 8181 (pod port = service port) and
# proxies 1:1 to the Lakekeeper Service (default port 8181, own pod, no
# port shuffle). The short service name `lakekeeper` suffices because
# the interceptor pod is deployed in the same namespace as the
# Lakekeeper service — CoreDNS completes the FQDN automatically via the
# search directive in /etc/resolv.conf.
#
# Anyone wanting to bypass the interceptor (in-cluster service clients
# with their own client_credentials token) talks to the Lakekeeper
# service directly — the receiver has nothing to do for those tokens
# anyway.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log off;                       # catalog traffic is high-volume,
                                          # Lakekeeper logs enough on its own
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    upstream lakekeeper {
        # Short service name — works because the interceptor pod is in
        # the same namespace as the Lakekeeper service. Cross-namespace
        # setup: rewrite to the FQDN here.
        server lakekeeper:8181;
        keepalive 32;
    }

    upstream rolesync {
        server 127.0.0.1:8200;
        keepalive 8;
    }

    server {
        listen 8181 default_server;

        # Hot path: everything goes 1:1 to Lakekeeper, mirrored to the receiver.
        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header Connection        "";
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://lakekeeper;

            # `mirror` is fire-and-forget — nginx does NOT wait for the
            # mirror response before sending the real response. A receiver
            # outage does not block any catalog request (fail-open by
            # design).
            mirror /_rolesync;
            mirror_request_body off;        # headers only (bearer token), no body
        }

        # Internal sub-request for the mirror. Forwards the Authorization
        # header explicitly because nginx may drop it on sub-requests.
        location = /_rolesync {
            internal;
            proxy_http_version 1.1;
            proxy_set_header Host             $host;
            proxy_set_header Connection       "";
            proxy_set_header Authorization    $http_authorization;
            proxy_set_header X-Original-URI   $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_connect_timeout 1s;       # receiver answers fast or not at all
            proxy_send_timeout    2s;
            proxy_read_timeout    2s;
            proxy_pass http://rolesync;
        }

        # Small self-healthcheck for the nginx container's readiness probe.
        location = /_nginx_health {
            access_log off;
            return 200 "ok\n";
        }
    }
}
