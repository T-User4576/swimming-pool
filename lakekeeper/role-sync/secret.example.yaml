# BEISPIEL — NIEMALS MIT ECHTEN WERTEN COMMITTEN
#
# Keycloak-Service-Account "svc-lakekeeper-sync" einmalig anlegen:
#   - Keycloak Admin → Clients → Create → Client ID: svc-lakekeeper-sync
#   - Service Account aktivieren, Client Secret generieren
#   - Service Account Roles → realm-management → view-users zuweisen
#   - In Lakekeeper-UI: svc-lakekeeper-sync → security_admin-Rolle zuweisen
#
# Echtes Secret anlegen:
#   kubectl create secret generic lakekeeper-role-sync-credentials \
#     --namespace lakekeeper \
#     --from-literal=KEYCLOAK_CLIENT_SECRET='<client-secret>'

apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-role-sync-credentials
  namespace: lakekeeper
type: Opaque
stringData:
  KEYCLOAK_CLIENT_SECRET: "CHANGEME"
