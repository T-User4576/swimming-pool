apiVersion: v1
kind: ConfigMap
metadata:
  name: lakekeeper-role-sync-script
  namespace: lakekeeper
data:
  sync.py: |
    """
    Keycloak → Lakekeeper Role-Sync Sidecar

    Liest ROLE_MAPPING_<ROLLE>=Gruppe1,Gruppe2,... aus Env-Vars und weist
    Lakekeeper-Rollen an User zu, die sich erstmals eingeloggt haben und noch
    keine Rolle besitzen. Manuell über die UI zugewiesene Rollen werden nicht
    überschrieben.

    Priorität bei mehrfacher Gruppen-Übereinstimmung: alphabetisch nach Rollenname
    (da ROLE_MAPPING_* alphabetisch nach Key sortiert werden).

    API-Referenz: /docs/docs/api/management-open-api.yaml im lakekeeper/lakekeeper-Repo.
    """
    import logging
    import os
    import sys
    import time

    import requests

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(message)s",
        stream=sys.stdout,
    )
    log = logging.getLogger("role-sync")

    KEYCLOAK_URL = os.environ["KEYCLOAK_URL"].rstrip("/")
    KEYCLOAK_REALM = os.environ["KEYCLOAK_REALM"]
    KEYCLOAK_CLIENT_ID = os.environ["KEYCLOAK_CLIENT_ID"]
    KEYCLOAK_CLIENT_SECRET = os.environ["KEYCLOAK_CLIENT_SECRET"]
    LAKEKEEPER_URL = os.environ.get("LAKEKEEPER_URL", "http://localhost:8181").rstrip("/")
    SYNC_INTERVAL = int(os.environ.get("SYNC_INTERVAL_SECS", "60"))


    def load_mapping() -> dict[str, list[str]]:
        """ROLE_MAPPING_<ROLLE>=Gruppe1,Gruppe2 → {ROLLE: [gruppen]}. Sortiert alphabetisch."""
        mapping: dict[str, list[str]] = {}
        prefix = "ROLE_MAPPING_"
        for key in sorted(os.environ):
            if key.startswith(prefix):
                role = key[len(prefix):]
                groups = [g.strip() for g in os.environ[key].split(",") if g.strip()]
                if groups:
                    mapping[role] = groups
        return mapping


    def get_token() -> str:
        resp = requests.post(
            f"{KEYCLOAK_URL}/realms/{KEYCLOAK_REALM}/protocol/openid-connect/token",
            data={
                "grant_type": "client_credentials",
                "client_id": KEYCLOAK_CLIENT_ID,
                "client_secret": KEYCLOAK_CLIENT_SECRET,
            },
            timeout=10,
        )
        resp.raise_for_status()
        return resp.json()["access_token"]


    def _lk_get(token: str, path: str) -> dict:
        resp = requests.get(
            f"{LAKEKEEPER_URL}{path}",
            headers={"Authorization": f"Bearer {token}"},
            timeout=10,
        )
        resp.raise_for_status()
        return resp.json()


    def _lk_post(token: str, path: str, body: dict) -> None:
        resp = requests.post(
            f"{LAKEKEEPER_URL}{path}",
            headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
            json=body,
            timeout=10,
        )
        resp.raise_for_status()


    def _get_all_pages(token: str, path: str, key: str) -> list:
        """Paginiert über Lakekeeper-Antworten.
        Query-Param: pageToken (camelCase). Response-Feld: next-page-token (kebab-case)."""
        results = []
        page_token: str | None = None
        while True:
            url = f"{path}?pageToken={page_token}" if page_token else path
            data = _lk_get(token, url)
            results.extend(data.get(key, []))
            page_token = data.get("next-page-token")
            if not page_token:
                break
        return results


    def get_lk_roles(token: str) -> dict[str, str]:
        """Gibt {ROLLENNAME_UPPER: role_id} zurück (alle Rollen, nicht nur gemappte)."""
        roles = _get_all_pages(token, "/management/v1/role", "roles")
        return {r["name"].upper(): r["id"] for r in roles}


    def get_assigned_user_ids(token: str, role_ids: list[str]) -> set[str]:
        """Alle Lakekeeper-User-IDs, die bereits irgendeine Rolle als Assignee haben.
        Endpoint: GET /management/v1/permissions/role/{role_id}/assignments
        Filtert auf type == 'assignee' und Einträge mit 'user'-Key (keine Rollen-Assignees)."""
        assigned: set[str] = set()
        for role_id in role_ids:
            items = _get_all_pages(
                token, f"/management/v1/permissions/role/{role_id}/assignments", "assignments"
            )
            for item in items:
                if item.get("type") == "assignee" and "user" in item:
                    assigned.add(item["user"])
        return assigned


    def keycloak_id_from_lk(lk_user_id: str) -> str | None:
        """Extrahiert Keycloak-UUID aus Lakekeeper-User-ID.
        Format: 'oidc~<keycloak-uuid>' → '<keycloak-uuid>'.
        Gibt None zurück für Nicht-OIDC-User (z.B. Kubernetes Service Accounts)."""
        if "~" in lk_user_id:
            prefix, subject = lk_user_id.split("~", 1)
            if prefix == "oidc":
                return subject
        return None


    def get_keycloak_groups(token: str, keycloak_user_id: str) -> list[str]:
        """Gibt Gruppennamen des Keycloak-Users zurück. Leere Liste bei 404."""
        resp = requests.get(
            f"{KEYCLOAK_URL}/admin/realms/{KEYCLOAK_REALM}/users/{keycloak_user_id}/groups",
            headers={"Authorization": f"Bearer {token}"},
            timeout=10,
        )
        if resp.status_code == 404:
            return []
        resp.raise_for_status()
        return [g["name"] for g in resp.json()]


    def assign_role(token: str, role_id: str, lk_user_id: str) -> None:
        """Weist User als Assignee einer Rolle zu.
        Endpoint: POST /management/v1/permissions/role/{role_id}/assignments
        Body: {"writes": [{"user": "<lk_user_id>", "type": "assignee"}]}"""
        _lk_post(
            token,
            f"/management/v1/permissions/role/{role_id}/assignments",
            {"writes": [{"user": lk_user_id, "type": "assignee"}]},
        )


    def sync(token: str, mapping: dict[str, list[str]]) -> None:
        if not mapping:
            log.warning("Kein ROLE_MAPPING_* konfiguriert — nichts zu tun.")
            return

        # Keycloak-Gruppe → Lakekeeper-Rollenname (erste Definition gewinnt bei Duplikat)
        group_to_role: dict[str, str] = {}
        for role, groups in mapping.items():
            for group in groups:
                group_to_role.setdefault(group, role)

        lk_roles = get_lk_roles(token)
        assigned_ids = get_assigned_user_ids(token, list(lk_roles.values()))
        all_users = _get_all_pages(token, "/management/v1/user", "users")
        unassigned = [u for u in all_users if u["id"] not in assigned_ids]

        if not unassigned:
            log.info("Keine neuen User ohne Rolle.")
            return

        log.info("%d User ohne Rolle — prüfe Keycloak-Gruppen.", len(unassigned))

        for user in unassigned:
            lk_user_id = user["id"]
            display = user.get("name") or lk_user_id

            keycloak_uuid = keycloak_id_from_lk(lk_user_id)
            if not keycloak_uuid:
                log.debug("User %s ist kein OIDC-User — übersprungen.", display)
                continue

            try:
                groups = get_keycloak_groups(token, keycloak_uuid)
            except requests.HTTPError as exc:
                log.warning("Keycloak-Abfrage für %s fehlgeschlagen: %s", display, exc)
                continue

            matched_role: str | None = None
            for group in groups:
                if group in group_to_role:
                    matched_role = group_to_role[group]
                    break

            if not matched_role:
                log.debug("User %s: keine gemappte Gruppe %s — bleibt ohne Rolle.", display, groups)
                continue

            role_id = lk_roles.get(matched_role.upper())
            if not role_id:
                log.warning(
                    "User %s: Rolle '%s' in Lakekeeper nicht gefunden — übersprungen.",
                    display, matched_role,
                )
                continue

            try:
                assign_role(token, role_id, lk_user_id)
                log.info("User %s → Rolle '%s' zugewiesen.", display, matched_role)
            except requests.HTTPError as exc:
                log.error("Rollenzuweisung für %s fehlgeschlagen: %s", display, exc)


    def main() -> None:
        mapping = load_mapping()
        log.info(
            "Role-Sync gestartet. Interval: %ds, Mapping: %s",
            SYNC_INTERVAL,
            {r: g for r, g in mapping.items()},
        )
        while True:
            try:
                token = get_token()
                sync(token, mapping)
            except Exception as exc:
                log.error("Sync-Fehler: %s", exc)
            time.sleep(SYNC_INTERVAL)


    if __name__ == "__main__":
        main()
