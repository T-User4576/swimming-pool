# INACTIVE — only usable with Lakekeeper+ (commercial, vakamo.com).
# Kept for evaluation. Active authorizer: OpenFGA (see ../openfga/).
apiVersion: v1
kind: ConfigMap
metadata:
  name: lakekeeper-cedar-policies
  namespace: lakekeeper
data:
  policies.cedar: |
    permit (
      principal in Lakekeeper::Role::"IT-Admin",
      action,
      resource
    );

    permit (
      principal in Lakekeeper::Role::"Viewer",
      action == Lakekeeper::Action::"read",
      resource is Lakekeeper::Warehouse
    );
