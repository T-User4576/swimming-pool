# INAKTIV — nur mit Lakekeeper+ (kommerziell, vakamo.com) verwendbar.
# Für Evaluierung aufbewahrt. Aktiver Authorizer: OpenFGA (siehe ../openfga/).
apiVersion: v1
kind: ConfigMap
metadata:
  name: lakekeeper-cedar-policies
  namespace: lakekeeper
data:
  policies.cedar: |
    permit (
      principal in Lakekeeper::Role::"IT-Admin",
      action,
      resource
    );

    permit (
      principal in Lakekeeper::Role::"Viewer",
      action == Lakekeeper::Action::"read",
      resource is Lakekeeper::Warehouse
    );
