# BEISPIEL — NIEMALS MIT ECHTEN WERTEN COMMITTEN
#
# Echtes Secret vor dem OpenFGA-Deployment anlegen:
#   kubectl create secret generic openfga-postgres-uri \
#     --namespace lakekeeper \
#     --from-literal=OPENFGA_DATASTORE_URI='postgres://openfga:PASSWORD@postgres-host:5432/openfga?sslmode=disable'

apiVersion: v1
kind: Secret
metadata:
  name: openfga-postgres-uri
  namespace: lakekeeper
type: Opaque
stringData:
  OPENFGA_DATASTORE_URI: "postgres://openfga:CHANGEME@postgres-host:5432/openfga?sslmode=disable"
