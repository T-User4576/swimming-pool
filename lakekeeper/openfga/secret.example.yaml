# EXAMPLE — NEVER COMMIT WITH REAL VALUES
#
# The openfga/openfga chart (verified against 0.3.5) reads the datastore
# URI from the secret key `uri` — NOT `OPENFGA_DATASTORE_URI` (which the
# OpenFGA binary itself uses as env var). The chart bridges between them.
#
# Create the real secret before deploying OpenFGA:
#   kubectl create secret generic openfga-postgres-uri \
#     --namespace lakekeeper \
#     --from-literal=uri='postgres://openfga:PASSWORD@postgres-host:5432/openfga?sslmode=disable'

apiVersion: v1
kind: Secret
metadata:
  name: openfga-postgres-uri
  namespace: lakekeeper
type: Opaque
stringData:
  uri: "postgres://openfga:CHANGEME@postgres-host:5432/openfga?sslmode=disable"
