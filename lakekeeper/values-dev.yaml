# Lakekeeper Helm values for dev (OpenFGA authorizer).
#
# IMPORTANT: override fragment. Merge with the existing cluster values
# before `helm upgrade`:
#   helm get values lakekeeper -n lakekeeper > current-values-dev.yaml
#
# Architecture: Lakekeeper runs here as a pure catalog deployment on the
# default port 8181. The token interceptor (nginx + role-sync) lives in
# its OWN deployment (see `lakekeeper/interceptor/`), not as a sidecar in
# the Lakekeeper pod — the official chart hardcodes port names a sidecar
# would collide with (the Service would then pick the first container =
# Lakekeeper, bypassing the interceptor).
#
# Routes to Lakekeeper:
#   - Service `lakekeeper-interceptor:8181` (separate manifest): UI/ingress
#     traffic; receiver auto-assigns roles on first login.
#   - Service `lakekeeper:8181` (from this chart): direct wire, for
#     in-cluster service clients with their own client_credentials token
#     (e.g. Spark, StarRocks) — saves a hop.

# Use the dedicated `authz.openfga.*` fields (chart 0.11.x). Setting
# the same thing via `catalog.extraEnv` with LAKEKEEPER__OPENFGA__*
# also works, but the chart's first-class fields are preferred — they
# survive value-merging better and document intent.
authz:
  backend: openfga
  openfga:
    endpoint: "http://openfga.lakekeeper.svc.cluster.local:8081"
    store: "lakekeeper"
