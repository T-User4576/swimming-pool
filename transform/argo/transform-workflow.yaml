# =============================================================================
# Transform-Spec-Runner — Argo Workflows
# =============================================================================
# Drei Bausteine:
#   1) WorkflowTemplate 'spark-transform'          -- ruft den Spec-Runner als
#                                                     SparkApplication auf,
#                                                     parametriert nach 'spec'
#   2) CronWorkflow 'transform-gold-revenue-daily'  -- Beispiel: eine Pipeline
#                                                     taeglich
#   3) CronWorkflow 'transform-orders-pipeline'     -- Beispiel-DAG: zwei
#                                                     verkettete Pipelines
#
# Voraussetzungen:
#   - Spark Operator im Cluster (sparkoperator.k8s.io)
#   - ConfigMap 'transform-runner-script' mit ../spark/runner.py
#   - ConfigMap 'transform-pipeline-specs' mit dem Inhalt von ../pipelines/
#   - Secret 'minio-credentials' mit S3-Credentials
#   (Anlegen siehe ../README.md, Abschnitt "Deployment")
#
# Agnostik-Prinzip:
#   - Eine generische Code-Basis (runner.py), ein WorkflowTemplate.
#   - Eine neue Pipeline = neue Spec-Datei in ../pipelines/ + neue CronWorkflow.
#     KEINE Aenderung an runner.py oder diesem WorkflowTemplate noetig.
#   - Die fachliche Definition lebt in der Spec, nicht im Code (analog dazu,
#     wie MV-Definitionen mit ihrer Mart-Pipeline versioniert werden).
# =============================================================================

---
# -----------------------------------------------------------------------------
# 1) Generischer WorkflowTemplate
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: spark-transform
  namespace: argo
spec:
  serviceAccountName: argo-workflow-spark
  entrypoint: run
  arguments:
    parameters:
      - name: spec              # Spec-Dateiname im specs-Mount, z.B. gold-revenue-daily.yaml
      - name: dry-run
        value: "false"
      - name: driver-memory
        value: "8g"
      - name: executor-instances
        value: "5"
      - name: executor-memory
        value: "16g"
      - name: executor-cores
        value: "4"
  templates:
    - name: run
      # Defaults hier, damit das Template sowohl via workflowTemplateRef (ganzer
      # Template, Bausteine 2) als auch via templateRef (einzelner Step in einem
      # DAG, Baustein 3) funktioniert. 'spec' bleibt Pflicht.
      inputs:
        parameters:
          - name: spec
          - name: dry-run
            value: "false"
          - name: driver-memory
            value: "8g"
          - name: executor-instances
            value: "5"
          - name: executor-memory
            value: "16g"
          - name: executor-cores
            value: "4"
      resource:
        action: create
        successCondition: status.applicationState.state == COMPLETED
        failureCondition: status.applicationState.state == FAILED
        manifest: |
          apiVersion: sparkoperator.k8s.io/v1beta2
          kind: SparkApplication
          metadata:
            generateName: spark-transform-
            namespace: spark
          spec:
            type: Python
            pythonVersion: "3"
            mode: cluster
            image: apache/spark:3.5.1-python3
            imagePullPolicy: IfNotPresent
            mainApplicationFile: local:///opt/spark/work-dir/runner.py
            arguments:
              - "--catalog"
              - "lake"
              - "--spec"
              - "/opt/spark/specs/{{inputs.parameters.spec}}"
              {{- if eq inputs.parameters.dry-run "true" }}
              - "--dry-run"
              {{- end }}
            sparkConf:
              # Iceberg + Lakekeeper (REST) + MinIO
              spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
              spark.sql.catalog.lake: org.apache.iceberg.spark.SparkCatalog
              spark.sql.catalog.lake.type: rest
              spark.sql.catalog.lake.uri: http://lakekeeper.lakekeeper.svc.cluster.local:8181/catalog
              spark.sql.catalog.lake.warehouse: main
              spark.sql.catalog.lake.io-impl: org.apache.iceberg.aws.s3.S3FileIO
              spark.sql.catalog.lake.s3.endpoint: http://minio.minio.svc.cluster.local:9000
              spark.sql.catalog.lake.s3.path-style-access: "true"
              spark.sql.defaultCatalog: lake
              # Performance — Transformationen haben Shuffles, daher AQE an
              spark.sql.adaptive.enabled: "true"
              spark.sql.adaptive.coalescePartitions.enabled: "true"
              spark.sql.adaptive.skewJoin.enabled: "true"
              spark.sql.shuffle.partitions: "400"
              spark.sql.iceberg.distribution-mode: hash
              spark.serializer: org.apache.spark.serializer.KryoSerializer
            deps:
              packages:
                - org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.0
                - org.apache.iceberg:iceberg-aws-bundle:1.6.0
                # fuer den Kafka-Source-Typ (bounded Batch-Read)
                - org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
            volumes:
              - name: transform-runner
                configMap:
                  name: transform-runner-script
              - name: transform-specs
                configMap:
                  name: transform-pipeline-specs
            driver:
              cores: 2
              memory: "{{inputs.parameters.driver-memory}}"
              labels: { version: "3.5.1" }
              serviceAccount: spark-driver
              envSecretKeyRefs:
                AWS_ACCESS_KEY_ID:
                  name: minio-credentials
                  key: access_key
                AWS_SECRET_ACCESS_KEY:
                  name: minio-credentials
                  key: secret_key
              volumeMounts:
                - name: transform-runner
                  mountPath: /opt/spark/work-dir
                - name: transform-specs
                  mountPath: /opt/spark/specs
            executor:
              cores: "{{inputs.parameters.executor-cores}}"
              instances: "{{inputs.parameters.executor-instances}}"
              memory: "{{inputs.parameters.executor-memory}}"
              labels: { version: "3.5.1" }
              envSecretKeyRefs:
                AWS_ACCESS_KEY_ID:
                  name: minio-credentials
                  key: access_key
                AWS_SECRET_ACCESS_KEY:
                  name: minio-credentials
                  key: secret_key
            restartPolicy:
              type: OnFailure
              onFailureRetries: 2
              onFailureRetryInterval: 30
              onSubmissionFailureRetries: 3
              onSubmissionFailureRetryInterval: 60
            timeToLiveSeconds: 3600

---
# -----------------------------------------------------------------------------
# 2) Beispiel-CronWorkflow: eine einzelne Pipeline taeglich
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: transform-gold-revenue-daily
  namespace: argo
spec:
  schedule: "0 3 * * *"           # 03:00 Uhr
  timezone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 10
  workflowSpec:
    workflowTemplateRef:
      name: spark-transform
    arguments:
      parameters:
        - name: spec
          value: "gold-revenue-daily.yaml"

---
# -----------------------------------------------------------------------------
# 3) Beispiel-DAG: verkettete Pipelines (Silver-Dedup -> Gold-Aggregation)
#    gold-revenue-daily startet erst, wenn silver-orders-dedup COMPLETED ist.
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: transform-orders-pipeline
  namespace: argo
spec:
  schedule: "0 4 * * *"           # 04:00 Uhr
  timezone: Europe/Berlin
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 10
  workflowSpec:
    serviceAccountName: argo-workflow-spark
    entrypoint: chain
    templates:
      - name: chain
        dag:
          tasks:
            - name: silver-orders
              templateRef:
                name: spark-transform
                template: run
              arguments:
                parameters:
                  - { name: spec, value: "silver-orders-dedup.yaml" }
            - name: gold-revenue
              dependencies: [silver-orders]
              templateRef:
                name: spark-transform
                template: run
              arguments:
                parameters:
                  - { name: spec, value: "gold-revenue-daily.yaml" }
