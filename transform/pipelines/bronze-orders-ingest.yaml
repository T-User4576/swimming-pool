# =============================================================================
# Example pipeline: S3 file -> bronze, CSV ingest.
# =============================================================================
# Reads a daily delivered CSV file from the landing bucket, enforces the
# input schema, and writes idempotently via overwrite_partitions into the
# bronze layer. No steps needed — pure format conversion (CSV -> Iceberg).
# Spec schema reference: ../transform-spec.md
# =============================================================================

name: bronze-orders-ingest
description: >
  Read CSV delivery from s3a://landing/orders/ and land it as an Iceberg
  table in lake.bronze.orders_raw. The schema is enforced so type errors
  in the delivery fail immediately.

source:
  type: file
  path: s3a://landing/orders/            # prefix: all files in the folder
  format: csv
  options:
    header: "true"
    delimiter: ";"
    # .gz compression is detected automatically from the file extension —
    # no extra option required.

schema:
  mode: enforce                          # select + cast to target schema; extra columns are dropped
  on_missing_columns: error             # missing required columns -> abort
  columns:
    - { name: order_id,    type: bigint,          nullable: false }
    - { name: customer_id, type: bigint,          nullable: false }
    - { name: order_ts,    type: timestamp,        nullable: false }
    - { name: status,      type: string }
    - { name: amount,      type: "decimal(12,2)" }
    - { name: discount_rate, type: "decimal(5,4)" }
    - { name: updated_at,  type: timestamp }
    - { name: ingest_ts,   type: timestamp }

# No steps — schema enforcement via the schema block above is enough;
# cleanup (dedup, filter) follows in the silver pipeline.

sink:
  type: iceberg
  table: lake.bronze.orders_raw
  mode: overwrite_partitions
